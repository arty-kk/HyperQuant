name: Feature request
description: Suggest an improvement to the product path or developer experience.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operating problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or workload context
      description: Why would this matter in a pilot or production rollout?
